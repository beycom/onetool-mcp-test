# ── Metadata ──────────────────────────────────────────────────────────────────
categories:
  classic_direct:        { count: 7,  description: "Direct 'ignore previous instructions' variants" }
  ot_mcp_specific:       { count: 8,  description: "OneTool >>> triggers, mcp__onetool__run patterns" }
  persona_hijacking:     { count: 6,  description: "Role/persona replacement attempts" }
  encoded_injection:     { count: 5,  description: "Base64, hex, ROT13, HTML entity encoding" }
  markdown_formatting:   { count: 6,  description: "HTML comments, details, code fences, tables" }
  hypothetical_jailbreak:{ count: 5,  description: "Fiction, hypotheticals, test environment claims" }
  cot_manipulation:      { count: 3,  description: "Chain-of-thought reasoning to bypass policy" }
  tool_call_forgery:     { count: 5,  description: "JSON, XML, Claude Code format tool call forgery" }
  prompt_leaking:        { count: 5,  description: "Context window and system prompt extraction" }
  ot_specific:           { count: 8,  description: "OT-specific tool invocations without >>> prefix" }
  nested_stacked:        { count: 3,  description: "Injection hidden inside prose, poems, dialogues" }
  false_authority:       { count: 5,  description: "Impersonating Anthropic, developers, admin" }
  delimiter_confusion:   { count: 5,  description: "Foreign model delimiters (ChatML, LLaMA, etc.)" }
  slow_subtle:           { count: 4,  description: "Polite, casual, or invisible embedded instructions" }
  boundary_escape:       { count: 12, description: "Attempts to escape <external-content> boundary" }
  slash_command:         { count: 13, description: "Slash command and Skill tool injection" }

ot_redaction_patterns:
  - pattern: "mcp__onetool__run"
    replacement: "[REDACTED:trigger]"
    description: "Direct MCP function name — always redacted by ot file.read"
  - pattern: "<external-content-*>"
    replacement: "[REDACTED:tag]"
    description: "Opening external-content boundary tags"
  - pattern: "</external-content-*>"
    replacement: "[REDACTED:tag]"
    description: "Closing external-content boundary tags — prevents boundary escape"
